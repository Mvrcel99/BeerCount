version: '3.8'
services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=biercounter123
      - DOCKER_INFLUXDB_INIT_ORG=dhbw
      - DOCKER_INFLUXDB_INIT_BUCKET=bier_events
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
